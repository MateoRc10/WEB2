<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <!-- Título de la pestaña del navegador -->
    <title>⚽ CanchasPro — Reservas Sintéticas</title>
    <base href="/" />

    <!-- Meta para responsive design (adaptar en celular/tablet) -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO: Descripción que aparece en Google -->
    <meta name="description" content="Sistema profesional de reservas de canchas sintéticas. Reserva tu cancha de fútbol 5, fútbol 7 o microfútbol en minutos." />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- ============================================================
         GOOGLE FONTS — Tipografía moderna y profesional
         'Inter' es la fuente usada por empresas como Apple, Google, Linear.
         Es limpia, legible y da aspecto premium a la interfaz.
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ============================================================
         BOOTSTRAP ICONS — Librería de íconos de Bootstrap
         Nos da más de 1800 íconos SVG para usar con <i class="bi bi-..."></i>
         Por ejemplo: bi-person, bi-lock, bi-calendar, bi-trash, etc.
         ============================================================ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    <!-- app-root es el selector de nuestro AppComponent principal en Angular.
         Angular reemplazará este tag con todo el contenido de la aplicación.
         El texto "Cargando..." solo aparece por un instante mientras Angular inicializa. -->
    <app-root>
      <!-- Pantalla de carga inicial mientras Angular bootea -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;">
        <div style="text-align:center;color:#22c55e;">
          <div style="font-size:3rem;">⚽</div>
          <div style="font-family:Inter,sans-serif;font-size:1.2rem;margin-top:1rem;opacity:0.8;">
            Cargando CanchasPro...
          </div>
        </div>
      </div>
    </app-root>
  </body>
</html>
