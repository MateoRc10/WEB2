<!-- ================================================================
     acceso-denegado.component.html — Vista de Acceso Denegado
     ================================================================ -->
<div class="denied-page fade-in-up">
  <div class="denied-card text-center">
    
    <!-- Ícono de escudo con error -->
    <div class="shield-wrapper mb-4">
      <i class="bi bi-shield-lock-fill shield-icon"></i>
      <i class="bi bi-x-circle-fill cross-icon"></i>
    </div>
    
    <h1 class="denied-title">Acceso Denegado</h1>
    <h2 class="denied-code">Error 403</h2>
    
    <p class="denied-desc mt-3">
      Lo sentimos, no tienes los permisos necesarios para ver esta página.
      Solo los administradores pueden acceder a esta sección.
    </p>
    
    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-outline-secondary" (click)="volver()">
        <i class="bi bi-arrow-left me-2"></i>Volver Atrás
      </button>
      <a [routerLink]="['/']" class="btn btn-success">
        <i class="bi bi-house me-2"></i>Ir al Inicio
      </a>
    </div>

  </div>
</div>
